<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSR Tracker: Arrest & Notice Us 35(3) BNSS</title>
    <!-- SheetJS for Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Supabase for Cloud DB & Admin Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 20px; }
        h2, h3 { color: #333; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow-x: auto; }
        .upload-section { background-color: #e9ecef; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .upload-section input[type="file"] { font-size: 16px; max-width: 100%; }
        .btn { padding: 10px 15px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; margin-top: 2px; margin-bottom: 2px; width: 100%; }
        .btn-export { background-color: #28a745; }
        .btn-export:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; margin-left: 10px;}
        .btn-clear:hover { background-color: #c82333; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; font-size: 14px; vertical-align: middle; }
        th { background-color: #343a40; color: white; white-space: nowrap; }
        input[type="date"] { padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 130px; }
        
        .bg-orange { background-color: #ffe8cc !important; color: #b35900; }
        .bg-green { background-color: #d4edda !important; color: #155724; }
        .text-red { color: red !important; font-weight: bold; }
        
        .role-selector { background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold;}

        @media screen and (max-width: 768px) {
            body { margin: 10px; }
            .container { padding: 10px; }
            .upload-section { flex-direction: column; align-items: flex-start; }
            .btn { width: 100%; margin-top: 5px; margin-left: 0; }
            th, td { font-size: 13px; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DSR Upload & Update Panel (Cloud Sync)</h2>
    
    <div class="upload-section">
        <div style="width: 100%; max-width: 400px;">
            <label for="dsrUpload" style="display: block; margin-bottom: 5px;"><strong>1. Upload DSR Excel/CSV File: </strong></label>
            <input type="file" id="dsrUpload" accept=".xlsx, .xls, .csv">
        </div>
        
        <!-- Role Simulation for CI vs SI Access -->
        <div>
            <label for="userRole"><strong>Current Login Role:</strong></label><br>
            <select id="userRole" class="role-selector" onchange="switchRole(this.value)">
                <option value="SI">SI (Sub-Inspector - View/Edit)</option>
                <option value="CI">CI (Admin - Full Access)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-export" onclick="exportToExcel()">2. Export Updated Excel</button>
            <button class="btn btn-clear" id="btn-clear-all" onclick="clearData()" style="display:none;">Clear All Data</button>
        </div>
    </div>

    <h3>Master Record: Information on Arrest & pending notices Us 35(3) BNSS</h3>
    <table id="masterTable">
        <thead>
            <tr>
                <th>1) S.No.</th>
                <th>2) Name of the PS, Cr.No. & Sec. of Law</th>
                <th>3) Date of offence</th>
                <th>4) Date of report</th>
                <th>5) Name of accused (Split)</th>
                <th>6) Date of arrest</th>
                <th>7) Date of notice served</th>
                <th>Status / Pending Days</th>
                <th>8) Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // --- CLOUD CONFIGURATION ---
    // Update these variables with your Supabase project credentials
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    // const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Current app state 
    let caseDatabase = JSON.parse(localStorage.getItem('DSR_App_Database')) || {};
    let currentUserRole = 'SI';

    window.onload = function() {
        // Here you would typically await fetchFromCloud()
        renderTable();
        switchRole(document.getElementById('userRole').value);
    };

    function switchRole(role) {
        currentUserRole = role;
        // Only CI should see the Clear All Data master button
        document.getElementById('btn-clear-all').style.display = (currentUserRole === 'CI') ? 'inline-block' : 'none';
        renderTable();
    }

    // Replace this function's logic with your supabaseClient.from('cases').upsert() logic
    async function saveToStorage() {
        localStorage.setItem('DSR_App_Database', JSON.stringify(caseDatabase));
        /* Cloud sync integration point:
        await supabaseClient.from('dsr_cases').upsert({
            id: 'master_db',
            data: caseDatabase 
        }); 
        */
    }

    function escapeHtml(text) {
        if (!text) return "";
        return text.toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function parseDateString(dateStr) {
        if (!dateStr) return new Date(0);
        let parts = dateStr.split(/[\.\-\/]/);
        if (parts.length === 3) {
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        return new Date(0);
    }

    document.getElementById('dsrUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1}); 
            
            processDSRData(jsonData);
            document.getElementById('dsrUpload').value = ""; 
        };
        reader.readAsArrayBuffer(file);
    });

    function processDSRData(rows) {
        let newDataAdded = false;
        let headerRowIndex = -1;
        let colPS = -1, colCrNo = -1, colSec = -1, colDateOff = -1, colDateRep = -1, colAccused = -1, colBrief = -1, colCombined = -1;

        for (let i = 0; i < Math.min(5, rows.length); i++) {
            if (rows[i] && rows[i].length > 0 && String(rows[i][0]).toLowerCase().includes('sl no')) {
                headerRowIndex = i;
                rows[i].forEach((headerText, index) => {
                    if(!headerText) return;
                    let text = String(headerText).toLowerCase().replace(/[\n\r]/g, ' ').trim();
                    
                    if (text.includes("brief facts")) colBrief = index;
                    else if (text.includes("name of accused") || text.includes("accused name") || (text.includes("accused") && !text.match(/no\.?\s*of|number\s*of/i))) {
                        colAccused = index;
                    }
                    else if (text.includes("sec") || text.includes("law") || text.includes("head of") || text.includes("crime classification")) colSec = index;
                    else if (text.includes("date") && text.includes("offence")) colDateOff = index;
                    else if (text.includes("date") && text.includes("report")) colDateRep = index;
                    else if (text === "ps" || text.includes("name of ps") || text.includes("police station")) colPS = index;
                    else if (text.includes("cr.no") || text.includes("cr no") || text.includes("crime no")) {
                        colCrNo = index;
                        colCombined = index; 
                    }
                });
                break;
            }
        }

        let startRow = headerRowIndex > -1 ? headerRowIndex + 1 : 1;
        let lastCaseId = null;

        for (let i = startRow; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;
            
            let originalSNo = row[0] ? String(row[0]).trim() : "";
            let isNewCase = /^\d+$/.test(originalSNo);
            
            let psName = "", crNo = "", secLaw = "", dateOff = "", dateRep = "";
            let accusedNames = (colAccused > -1 && row[colAccused]) ? String(row[colAccused]) : (row[6] ? String(row[6]) : "");
            let combinedColumn = (colCombined > -1 && row[colCombined]) ? String(row[colCombined]) : (row[1] ? String(row[1]) : "");
            let briefFacts = (colBrief > -1 && row[colBrief]) ? String(row[colBrief]) : (row[8] ? String(row[8]) : "");

            if (colPS > -1 && row[colPS]) psName = String(row[colPS]).trim();
            if (colCrNo > -1 && row[colCrNo]) crNo = String(row[colCrNo]).trim();
            if (colSec > -1 && row[colSec]) secLaw = String(row[colSec]).trim();

            if (!psName && combinedColumn) {
                let psMatch = combinedColumn.match(/(.*?)(?=\s*[\/]?\s*Cr\s*\.?\s*No)/i);
                psName = psMatch ? psMatch[1].trim() : combinedColumn.trim();
            }
            if (!crNo && combinedColumn) {
                let crMatch = combinedColumn.match(/Cr\s*\.?\s*No\.?[\s:]*([\w\d]+\/\d{2,4})/i);
                if (!crMatch) crMatch = combinedColumn.match(/(\d{1,4}\/\d{4})/); 
                crNo = crMatch ? crMatch[1].trim() : "";
            }
            
            if (isNewCase && !crNo) {
                let rowStr = row.join(" ");
                let fallbackCrMatch = rowStr.match(/(?:Cr\.?No\.?|Crime\s+No\.?|Cr\s+No\.?)[\s\:]*([\w\d]+\/\d{2,4})/i);
                if (!fallbackCrMatch) fallbackCrMatch = rowStr.match(/\b(\d{1,4}\/\d{4})\b/);
                if (fallbackCrMatch) crNo = fallbackCrMatch[1].trim();
            }

            if (!secLaw || !/\d/.test(secLaw)) {
                let secMatch = combinedColumn.match(/U\/?(?:Sec:?|Sec|s)[\s:]*([\s\S]*)/i);
                if (secMatch) {
                    secLaw = "U/s " + secMatch[1].trim();
                } else {
                    let briefSecMatch = briefFacts.match(/(?:U\/s\.?|U\/Sec\.?|Under Sec|Sec)[\s:]*([0-9a-zA-Z\s\(\),\-\.\/]+(?:BNS|IPC|ACT|Act|CrPC))/i);
                    if (briefSecMatch) {
                        secLaw = "U/s " + briefSecMatch[1].trim();
                    } else {
                        let standaloneMatch = briefFacts.match(/\b(\d{1,3}(?:\([a-zA-Z0-9]+\))?\s*(?:BNS|IPC|CrPC|MV Act|Act))\b/i);
                        if (standaloneMatch) secLaw = "U/s " + standaloneMatch[1].trim();
                    }
                }
            }
            
            if (secLaw && secLaw.length > 20 && secLaw.toLowerCase().includes("cr")) {
                let uMatch = secLaw.match(/U\/?(?:Sec:?|Sec|s)[\s:]*([\s\S]*)/i);
                if (uMatch) secLaw = "U/s " + uMatch[1].trim();
            }

            if (colDateOff > -1 && row[colDateOff]) dateOff = String(row[colDateOff]).trim();
            if (colDateRep > -1 && row[colDateRep]) dateRep = String(row[colDateRep]).trim();

            if (!dateOff && briefFacts) {
                let offMatch = briefFacts.match(/occurred[\s\S]*?(\d{2}[\./-]\d{2}[\./-]\d{4})/i);
                if (offMatch) dateOff = offMatch[1];
            }
            if (!dateRep && briefFacts) {
                let repMatch = briefFacts.match(/reported[\s\S]*?(\d{2}[\./-]\d{2}[\./-]\d{4})/i);
                if (repMatch) dateRep = repMatch[1];
                if (!dateRep && briefFacts.toLowerCase().includes("same day")) dateRep = dateOff;
            }

            let combinedTextForFilter = (secLaw + " " + briefFacts + " " + combinedColumn).toLowerCase();
            if (combinedTextForFilter.match(/194.*?bnss/i) || combinedTextForFilter.includes("missing")) {
                continue; 
            }

            let uniqueCaseId = "";
            if (isNewCase) {
                uniqueCaseId = `${psName}_${crNo}`;
                if (!crNo && !psName) uniqueCaseId = `UnknownPS_Row${originalSNo}`;
                lastCaseId = uniqueCaseId;
                
                if (!caseDatabase[uniqueCaseId]) {
                    caseDatabase[uniqueCaseId] = {
                        psName: psName,
                        crNo: crNo,
                        secLaw: secLaw,
                        dateOff: dateOff,
                        dateRep: dateRep,
                        accusedData: {}
                    };
                }
            } else if (lastCaseId && (accusedNames || combinedColumn)) {
                uniqueCaseId = lastCaseId;
            } else {
                continue; 
            }

            let accusedList = [];
            let lowerAcc = accusedNames.toLowerCase();
            
            if (lowerAcc.includes("unknown accused") || lowerAcc.includes("unknown offender") || lowerAcc.includes("unknown person")) {
                accusedList = ["Unknown Accused"];
            } else {
                let accusedMatches = accusedNames.match(/\d+[\)\.][\s\S]*?(?=\d+[\)\.]|$)/g);
                let rawList = [];
                
                if (accusedMatches && accusedMatches.length > 0) {
                    rawList = accusedMatches.map(name => name.replace(/^\s*\d+[\)\.]\s*/, '').trim());
                } else {
                    rawList = accusedNames.split('\n').filter(l => l.trim().length > 1);
                }

                rawList.forEach(n => {
                    let clean = n
                        .replace(/(?:Aadhar|Aadhaar)[\s\S]*/gi, "") 
                        .replace(/(?:Cell|Ph|Phone|Mobile|Contact)[\s\S]*/gi, "") 
                        .replace(/\b\d{10}\b[\s\S]*/g, "") 
                        .replace(/\b\d{12}\b[\s\S]*/g, "")
                        .replace(/\.?istrict.*/gi, "")
                        .replace(/vides.*/gi, "")
                        .replace(/^[\s,:\-\.]+/g, '') 
                        .replace(/[\s,:\-\.]+$/g, '') 
                        .trim();
                    
                    let alphaOnly = clean.replace(/[^\p{L}]/gu, ''); 
                    if (alphaOnly.length >= 2 && clean.toLowerCase() !== "nil") {
                        if (clean.length > 120) { 
                            clean = clean.substring(0, 120) + "... (Details Truncated)"; 
                        }
                        accusedList.push(clean);
                    }
                });
            }

            if (accusedList.length === 0 || (accusedList.length === 1 && accusedList[0] === "")) {
                accusedList = ["Not Mentioned (Add Manually)"];
            }

            let existingAccused = caseDatabase[uniqueCaseId].accusedData;
            accusedList.forEach(newAcc => {
                if (newAcc && !existingAccused[newAcc]) {
                    existingAccused[newAcc] = { arrestDate: "", noticeDate: "" };
                    newDataAdded = true;
                    if (existingAccused["Not Mentioned (Add Manually)"]) {
                        delete existingAccused["Not Mentioned (Add Manually)"];
                    }
                }
            });
        }

        if (newDataAdded) {
            saveToStorage();
            renderTable();
            alert("New DSR Data Added Successfully!");
        } else {
            alert("ఈ Case ID లు అన్నీ ముందే ఉన్నాయి. టేబుల్ లో డబుల్ ఎంట్రీలు వేయబడవు.");
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 

        let casesArray = [];
        for (let caseId in caseDatabase) {
            casesArray.push({
                caseId: caseId,
                ...caseDatabase[caseId]
            });
        }

        casesArray.sort((a, b) => parseDateString(a.dateRep) - parseDateString(b.dateRep));

        let displaySerialNo = 1;

        casesArray.forEach((caseData) => {
            let accusedKeys = Object.keys(caseData.accusedData);
            if (accusedKeys.length === 0) return; 
            let rowSpanCount = accusedKeys.length;

            accusedKeys.forEach((accName, index) => {
                const tr = document.createElement('tr');
                tr.setAttribute("data-report-date", caseData.dateRep); 
                
                let accDetails = caseData.accusedData[accName];
                let htmlContent = "";

                let safeAccName = escapeHtml(accName);
                let safeCaseId = escapeHtml(caseData.caseId);
                let safePsName = escapeHtml(caseData.psName);
                let safeCrNo = escapeHtml(caseData.crNo);
                let safeSecLaw = escapeHtml(caseData.secLaw);
                
                if (index === 0) {
                    htmlContent += `
                        <td rowspan="${rowSpanCount}">${displaySerialNo++}</td>
                        <td rowspan="${rowSpanCount}">
                            <strong>${safePsName}</strong><br>
                            <strong>${safeCrNo}</strong><br>
                            ${safeSecLaw}
                        </td>
                        <td rowspan="${rowSpanCount}">${escapeHtml(caseData.dateOff)}</td>
                        <td rowspan="${rowSpanCount}">${escapeHtml(caseData.dateRep)}</td>
                    `;
                }

                // Cloud Role Check: Render delete button only if CI
                let deleteButton = currentUserRole === 'CI' ? 
                    `<button class="btn btn-sm btn-danger" onclick="deleteAccused('${safeCaseId}', '${safeAccName}')">Delete</button>` : '';

                htmlContent += `
                    <td style="white-space: pre-wrap; font-size:13px;"><span class="accused-name"><strong>${safeAccName}</strong></span></td>
                    <td><input type="date" class="arrest-date" data-case="${safeCaseId}" data-acc="${safeAccName}" value="${accDetails.arrestDate}"></td>
                    <td><input type="date" class="notice-date" data-case="${safeCaseId}" data-acc="${safeAccName}" value="${accDetails.noticeDate}"></td>
                    <td class="status-cell"><strong>Calculating...</strong></td>
                    <td style="text-align: center;">
                        ${deleteButton}
                        ${index === 0 ? `<button class="btn btn-sm btn-primary" onclick="addAccused('${safeCaseId}')">+ Add Accused</button>` : ''}
                    </td>
                `;

                tr.innerHTML = htmlContent;
                tbody.appendChild(tr);

                tr.querySelector('.arrest-date').addEventListener('change', handleDateChange);
                tr.querySelector('.notice-date').addEventListener('change', handleDateChange);

                updateRowColor(tr); 
            });
        });
    }

    function handleDateChange(e) {
        let input = e.target;
        let caseId = input.getAttribute('data-case');
        let accName = input.getAttribute('data-acc');
        
        if (input.classList.contains('arrest-date')) {
            caseDatabase[caseId].accusedData[accName].arrestDate = input.value;
        } else {
            caseDatabase[caseId].accusedData[accName].noticeDate = input.value;
        }
        
        saveToStorage(); 
        updateRowColor(input.closest('tr'));
    }

    function updateRowColor(tr) {
        const arrestDate = tr.querySelector('.arrest-date').value;
        const noticeDate = tr.querySelector('.notice-date').value;
        const reportDateText = tr.getAttribute('data-report-date'); 
        const statusCell = tr.querySelector('.status-cell strong');
        const accusedNameSpan = tr.querySelector('.accused-name');

        if (arrestDate || noticeDate) {
            tr.className = "bg-green";
            accusedNameSpan.classList.remove('text-red');
            let statusMsgs = [];
            if (arrestDate) statusMsgs.push("Arrested");
            if (noticeDate) statusMsgs.push("Notice Served");
            statusCell.innerText = "Completed (" + statusMsgs.join(" & ") + ")";
            statusCell.style.color = "#155724";
        } else {
            tr.className = "bg-orange";
            statusCell.style.color = "#b35900";
            
            let daysPending = 0;
            if (reportDateText) {
                let parts = reportDateText.split(/[\.\-\/]/);
                if(parts.length === 3) {
                    let repDateObj = new Date(parts[2], parts[1] - 1, parts[0]);
                    let today = new Date();
                    today.setHours(0,0,0,0);
                    let timeDiff = today.getTime() - repDateObj.getTime();
                    daysPending = Math.floor(timeDiff / (1000 * 3600 * 24));
                    statusCell.innerText = daysPending >= 0 ? `${daysPending} Days Pending` : `Pending`;
                } else {
                    statusCell.innerText = `Pending`;
                }
            } else {
                statusCell.innerText = `Pending`;
            }

            if (daysPending > 15) {
                accusedNameSpan.classList.add('text-red');
            } else {
                accusedNameSpan.classList.remove('text-red');
            }
        }
    }

    window.addAccused = function(caseId) {
        let newAccName = prompt("కొత్త ముద్దాయి పేరును నమోదు చేయండి (Enter new accused name):");
        if (newAccName && newAccName.trim() !== "") {
            newAccName = newAccName.trim();
            if (!caseDatabase[caseId].accusedData[newAccName]) {
                caseDatabase[caseId].accusedData[newAccName] = { arrestDate: "", noticeDate: "" };
                
                if (caseDatabase[caseId].accusedData["Not Mentioned (Add Manually)"]) {
                    delete caseDatabase[caseId].accusedData["Not Mentioned (Add Manually)"];
                }
                
                saveToStorage();
                renderTable();
            } else {
                alert("ఈ పేరు ఇప్పటికే ఈ కేసులో ఉంది! (Accused already exists in this case)");
            }
        }
    };

    // Restricted to CI view based on conditional HTML rendering in renderTable
    window.deleteAccused = function(caseId, accName) {
        if(currentUserRole !== 'CI') {
            alert("Access Denied: Only CI level admins can delete accused records.");
            return;
        }

        if(confirm(`మీరు నిజంగా "${accName}" ను తొలగించాలనుకుంటున్నారా? (Are you sure you want to delete this accused?)`)) {
            let rawAccName = accName.replace(/&amp;/g, "&")
                                    .replace(/&lt;/g, "<")
                                    .replace(/&gt;/g, ">")
                                    .replace(/&quot;/g, '"')
                                    .replace(/&#039;/g, "'");
            
            let rawCaseId = caseId.replace(/&amp;/g, "&")
                                  .replace(/&lt;/g, "<")
                                  .replace(/&gt;/g, ">")
                                  .replace(/&quot;/g, '"')
                                  .replace(/&#039;/g, "'");

            delete caseDatabase[rawCaseId].accusedData[rawAccName];
            
            if(Object.keys(caseDatabase[rawCaseId].accusedData).length === 0) {
                delete caseDatabase[rawCaseId];
            }
            
            saveToStorage();
            renderTable();
        }
    };

    function exportToExcel() {
        const table = document.getElementById("masterTable");
        
        // Clone the table to manipulate nodes without affecting UI
        const clone = table.cloneNode(true);
        const originalInputs = table.querySelectorAll('input[type="date"]');
        const cloneInputs = clone.querySelectorAll('input[type="date"]');
        
        // Extract values from original inputs and swap them into the clone as text nodes
        for (let i = 0; i < originalInputs.length; i++) {
            let val = originalInputs[i].value;
            let textNode = document.createTextNode(val ? val : "");
            cloneInputs[i].parentNode.insertBefore(textNode, cloneInputs[i]);
            cloneInputs[i].parentNode.removeChild(cloneInputs[i]); // Remove the input node
        }

        const wb = XLSX.utils.table_to_book(clone, {sheet: "Pending Notices Track"});
        XLSX.writeFile(wb, "Arrest_and_Pending_Notices_Appended.xlsx");
    }

    function clearData() {
        if(currentUserRole !== 'CI') return; // Double-check access
        
        if(confirm("అన్ని వివరాలు శాశ్వతంగా తొలగించబడతాయి. మీరు నిజంగా Clear చేయాలనుకుంటున్నారా? (Cannot be undone)")) {
            caseDatabase = {};
            saveToStorage();
            renderTable();
        }
    }
</script>

</body>
</html>
